<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年刊</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;           /* 不要出現橫向捲軸 */
      background: #f2f2f2;
    }

    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 翻頁容器：吃滿寬度 + 高度接近滿版 */
    #book {
      width: 100%;
      height: 95vh;               /* 可改 100vh */
      max-width: 1800px;          /* 避免超寬螢幕太誇張，可自行調大/拿掉 */
    }

    /* 載入提示 */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f2;
      font: 16px/1.4 system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #333;
    }
  </style>
</head>

<body>
  <div id="loading">載入中…</div>

  <div id="wrap">
    <div id="book"></div>
  </div>

  <!-- CDN (較穩) -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    (function () {
      const pageCount = 36; // P00 ~ P35

      const images = Array.from({ length: pageCount }, (_, i) =>
        `assets/P${String(i).padStart(2, "0")}.jpg`
      );

      function isNarrow() {
        // 你可把 980 這個門檻調整：數字越大，越容易進單頁模式
        return window.innerWidth < 980;
      }

      let pageFlip;

      function init() {
        const bookEl = document.getElementById("book");
        const loadingEl = document.getElementById("loading");

        if (!bookEl) return;

        if (!window.St || !St.PageFlip) {
          loadingEl.textContent = "翻頁程式載入失敗（St.PageFlip 不存在）";
          return;
        }

        // 清空容器（避免重初始化疊在一起）
        bookEl.innerHTML = "";

        pageFlip = new St.PageFlip(bookEl, {
          width: 600,
          height: 800,
          size: "stretch",

          showCover: true,          // 若不想封面單頁左邊空白，可改 false
          mobileScrollSupport: false,

          // 關鍵：窄螢幕用單頁，寬螢幕允許雙頁
          usePortrait: isNarrow(),

          // 可選：限制可縮放範圍，讓顯示更穩
          minWidth: 320,
          maxWidth: 2200,
          minHeight: 420,
          maxHeight: 1400
        });

        pageFlip.loadFromImages(images);
        loadingEl.style.display = "none";
      }

      // 初次載入
      window.addEventListener("load", init);

      // 視窗寬度改變時：重新初始化以切換單頁/雙頁
      let resizeTimer;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          // 只有當「窄/寬狀態」改變時才重建，避免一直重建
          const shouldPortrait = isNarrow();
          if (pageFlip && pageFlip.getSettings && pageFlip.getSettings().usePortrait === shouldPortrait) return;
          init();
        }, 250);
      });
    })();
  </script>
</body>
</html>

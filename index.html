<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年刊</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    }

    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #book {
      width: 100%;
      height: 95vh;
      max-width: 1800px; /* 想更寬可調大或拿掉 */
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f2;
      color: #333;
      z-index: 10;
    }

    /* 工具列（要在全螢幕也看得到） */
    #toolbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #toolbar button, #toolbar a {
      appearance: none;
      border: 1px solid rgba(0,0,0,.15);
      background: rgba(255,255,255,.92);
      color: #111;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
    }

    #btnExit { display: none; } /* 進全螢幕才顯示 */
  </style>
</head>

<body>
  <div id="loading">載入中…</div>

  <div id="toolbar">
    <a href="https://kktravel.github.io/annual/annual.pdf"
   target="_top" rel="noopener noreferrer">PDF</a>
    <button id="btnFull" type="button">全螢幕</button>
    <button id="btnExit" type="button">退出全螢幕</button>
  </div>

  <div id="wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    (function () {
      // ===== 依你檔案調整 =====
      const pageCount = 36; // P00 ~ P35
      const images = Array.from({ length: pageCount }, (_, i) =>
        `assets/P${String(i).padStart(2, "0")}.jpg`
      );

      const bookEl = document.getElementById("book");
      const loadingEl = document.getElementById("loading");
      const btnFull = document.getElementById("btnFull");
      const btnExit = document.getElementById("btnExit");

      function isNarrow() {
        // 官網 iframe 常比較窄：想更常「單頁」就把 980 調大 (如 1100/1200)
        return window.innerWidth < 980;
      }

      let pageFlip = null;
      let lastPortrait = null;

      function initFlip() {
        if (!window.St || !St.PageFlip) {
          loadingEl.textContent = "翻頁程式載入失敗（St.PageFlip 不存在）";
          return;
        }

        const portrait = isNarrow();
        if (pageFlip && lastPortrait === portrait) return;
        lastPortrait = portrait;

        bookEl.innerHTML = "";
        loadingEl.style.display = "flex";

        pageFlip = new St.PageFlip(bookEl, {
          width: 600,
          height: 800,
          size: "stretch",
          showCover: true,            // 不想封面單頁留白可改 false
          mobileScrollSupport: false,
          usePortrait: portrait
        });

        pageFlip.loadFromImages(images);
        loadingEl.style.display = "none";
      }

      function syncFullscreenUI() {
        const on = !!document.fullscreenElement;
        btnFull.style.display = on ? "none" : "inline-block";
        btnExit.style.display = on ? "inline-block" : "none";
      }

      async function enterFullscreen() {
        try {
          // 關鍵：全螢幕要包含 toolbar，所以用整個 document
          await document.documentElement.requestFullscreen();
        } catch (e) {
          alert("全螢幕被瀏覽器阻擋。若從官網 iframe 開啟，請確認 iframe 有 allowfullscreen / allow='fullscreen'。");
        }
      }

      async function exitFullscreen() {
        try {
          if (document.fullscreenElement) await document.exitFullscreen();
        } catch (e) {}
      }

      btnFull.addEventListener("click", enterFullscreen);
      btnExit.addEventListener("click", exitFullscreen);

      // 已取消雙擊切換：不要加 dblclick 事件即可

      document.addEventListener("fullscreenchange", syncFullscreenUI);

      window.addEventListener("load", () => {
        initFlip();
        syncFullscreenUI();
      });

      let t = null;
      window.addEventListener("resize", () => {
        clearTimeout(t);
        t = setTimeout(initFlip, 200);
      });
    })();
  </script>
</body>
</html>

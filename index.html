<body>
  <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f2f2f2;font:16px/1.4 sans-serif;">
    載入中…
  </div>

  <div id="wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
  <script>
    window.addEventListener('load', () => {
      const bookEl = document.getElementById('book');
      if (!bookEl) {
        document.getElementById('loading').textContent = 'HTML 缺少 #book 容器';
        return;
      }
      if (!window.St || !St.PageFlip) {
        document.getElementById('loading').textContent = '翻頁程式載入失敗（St.PageFlip 不存在）';
        return;
      }

      const pageCount = 36; // P00 ~ P35
      const images = Array.from({ length: pageCount }, (_, i) =>
        `assets/P${String(i).padStart(2, "0")}.jpg`
      );

      const pageFlip = new St.PageFlip(bookEl, {
        width: 600,
        height: 800,
        size: "stretch",
        showCover: true,
        mobileScrollSupport: false
      });

      pageFlip.loadFromImages(images);
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年刊</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    }

    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #book {
      width: 100%;
      height: 95vh;
      max-width: 1800px; /* 想更寬可調大或拿掉 */
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f2;
      color: #333;
      z-index: 10;
    }

    /* 右上角工具列 */
    #toolbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #toolbar button, #toolbar a {
      appearance: none;
      border: 1px solid rgba(0,0,0,.15);
      background: rgba(255,255,255,.9);
      color: #111;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
    }
  </style>
</head>

<body>
  <div id="loading">載入中…</div>

  <div id="toolbar">
    <a href="annual.pdf" target="_blank" rel="noopener">PDF</a>
    <button id="btnFull">全螢幕</button>
  </div>

  <div id="wrap">
    <div id="book"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    (function () {
      // ====== 依你檔案調整 ======
      const pageCount = 36; // P00 ~ P35
      const images = Array.from({ length: pageCount }, (_, i) =>
        `assets/P${String(i).padStart(2, "0")}.jpg`
      );

      const bookEl = document.getElementById("book");
      const loadingEl = document.getElementById("loading");
      const btnFull = document.getElementById("btnFull");
      const wrapEl = document.getElementById("wrap");

      function isNarrow() {
        // 官網 iframe 常較窄：想更容易變單頁，把 980 調大 (如 1100/1200)
        return window.innerWidth < 980;
      }

      let pageFlip = null;
      let lastPortrait = null;

      function initFlip() {
        if (!window.St || !St.PageFlip) {
          loadingEl.textContent = "翻頁程式載入失敗（St.PageFlip 不存在）";
          return;
        }

        const portrait = isNarrow();
        if (lastPortrait === portrait && pageFlip) return; // 狀態沒變就不重建
        lastPortrait = portrait;

        bookEl.innerHTML = "";
        loadingEl.style.display = "flex";

        pageFlip = new St.PageFlip(bookEl, {
          width: 600,
          height: 800,
          size: "stretch",
          showCover: true,
          mobileScrollSupport: false,
          usePortrait: portrait
        });

        pageFlip.loadFromImages(images);
        loadingEl.style.display = "none";
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await wrapEl.requestFullscreen();
            btnFull.textContent = "退出";
          } else {
            await document.exitFullscreen();
            btnFull.textContent = "全螢幕";
          }
        } catch (e) {
          alert("全螢幕被瀏覽器阻擋，請再點一次或確認 iframe 有 allowfullscreen。");
        }
      }

      btnFull.addEventListener("click", toggleFullscreen);

      // 雙擊頁面也可全螢幕（可選）
      wrapEl.addEventListener("dblclick", toggleFullscreen);

      window.addEventListener("load", initFlip);

      let t = null;
      window.addEventListener("resize", () => {
        clearTimeout(t);
        t = setTimeout(initFlip, 200);
      });

      document.addEventListener("fullscreenchange", () => {
        btnFull.textContent = document.fullscreenElement ? "退出" : "全螢幕";
      });
    })();
  </script>
</body>
</html>

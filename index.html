<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年刊</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #wrap { height: 100vh; display:flex; align-items:center; justify-content:center; background:#f2f2f2; }
    #book { width:min(1200px, 100vw); height:min(820px, 100vh); }
  </style>
</head>
<body>
  <div id="wrap"><div id="book"></div></div>

  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>
  <script>
    const pageCount = 36; // P00 ~ P35

    const images = Array.from({ length: pageCount }, (_, i) =>
      `assets/P${String(i).padStart(2, "0")}.jpg`
    );

    const pageFlip = new St.PageFlip(document.getElementById("book"), {
      width: 600,
      height: 800,
      size: "stretch",
      showCover: true,
      mobileScrollSupport: false
    });

    pageFlip.loadFromImages(images);
  </script>
</body>
</html>
